version: '3.8'

services:
  # 1. MongoDB Database
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - duality_mongo_data:/data/db

  # 2. Redis coordination hub
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # 3. Dedicated API Server
  api-server:
    build: 
      context: .
      dockerfile: docker/Dockerfile.server
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/duality
      - REDIS_URL=redis://redis:6379
      - START_WORKER=false # API Server stays lightweight, only handles IO
    ports:
      - "5001:5001"
    depends_on:
      - mongodb
      - redis

  # 4. Isolated Execution Worker
  execution-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Required to run sibling Docker containers
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/duality
      - REDIS_URL=redis://redis:6379
      - QUEUE_CONCURRENCY=8 # Dedicated worker handles high compute load
    depends_on:
      - mongodb
      - redis

volumes:
  duality_mongo_data:
